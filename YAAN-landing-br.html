<style>
@font-face {

*, *::before, *::after {

/* Dust canvas — sits over everything, never blocks clicks */
#dust {

  top: 0;

  pointer-events: none;
  z-index: 10;
  opacity: 1;

.content-wrapper {

  z-index: 20; /* sits above the dust layer */

  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);

<!-- Floating dust particle system -->
<script>
(function () {
  var canvas = document.getElementById('dust');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var COUNT = 80;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function randomParticle(forceY) {
    return {
      x: Math.random() * canvas.width,
      y: forceY !== undefined ? forceY : Math.random() * canvas.height,
      radius: Math.random() * 1.5 + 0.3,         // 0.3–1.8px — tiny specks
      opacity: Math.random() * 0.5 + 0.1,         // 0.1–0.6
      speedX: (Math.random() - 0.5) * 0.3,        // gentle horizontal drift
      speedY: -(Math.random() * 0.4 + 0.05),      // slow upward float
      wobble: Math.random() * Math.PI * 2,         // phase offset for sine wobble
      wobbleSpeed: (Math.random() * 0.01 + 0.003), // how fast it sways
      wobbleAmount: Math.random() * 0.6 + 0.2,    // how wide the sway is
      fadeSpeed: (Math.random() * 0.002 + 0.001), // slow twinkle
      fadeDir: Math.random() > 0.5 ? 1 : -1
    };
  }

  // Seed initial particles spread across the full height
  for (var i = 0; i < COUNT; i++) {
    particles.push(randomParticle());
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Movement
      p.wobble += p.wobbleSpeed;
      p.x += p.speedX + Math.sin(p.wobble) * p.wobbleAmount;
      p.y += p.speedY;

      // Gentle opacity twinkle
      p.opacity += p.fadeSpeed * p.fadeDir;
      if (p.opacity > 0.65) { p.opacity = 0.65; p.fadeDir = -1; }
      if (p.opacity < 0.05) { p.opacity = 0.05; p.fadeDir = 1; }

      // Respawn at bottom when particle drifts off top
      if (p.y < -5) {
        particles[i] = randomParticle(canvas.height + 5);
      }
      // Wrap horizontally
      if (p.x < -5) p.x = canvas.width + 5;
      if (p.x > canvas.width + 5) p.x = -5;

      // Draw — soft glowing dot
      var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 2);
      grad.addColorStop(0, 'rgba(255, 245, 220, ' + p.opacity + ')');
      grad.addColorStop(1, 'rgba(255, 245, 220, 0)');

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * 2, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }

  animate();
})();
</script>
