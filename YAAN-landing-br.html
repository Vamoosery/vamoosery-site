<style>
@font-face {
  font-family: 'diamondsregular';
  src: url('diamondsregular.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}

*, *::before, *::after {
  box-sizing: border-box;
}

body {
  font-family: 'diamondsregular', Arial, sans-serif;
  color: #fff;
  margin: 0;
  text-align: center;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  background-image: url('YAAN landing page gradient.webp');
  background-repeat: no-repeat;
  background-size: cover;
  background-position: center center;
}

/* Dust canvas — sits over everything, never blocks clicks */
#dust {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
  opacity: 0.055;
}

.content-wrapper {
  position: relative;
  z-index: 20; /* sits above the dust layer */
  background: rgba(0, 0, 0, 0.2);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 50px 40px 45px;
  border-radius: 12px;
  animation: fadeIn 1.2s ease forwards;
  opacity: 0;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* Logo */
img.logo {
  display: block;
  max-width: 80%;
  height: auto;
  margin: 0 auto 14px auto;
}

/* Album title */
h1 {
  font-family: 'diamondsregular', Arial, sans-serif;
  font-size: 2.2em;
  margin: 0 0 0em 0;
  color: #fff;
}

/* SUB HEADING */
h2 {
  font-family: 'diamondsregular', Arial, sans-serif;
  font-size: 0.95em;
  line-height: 1.6em;
  margin: 0 0 1.4em 0;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.85);
  opacity: 0.9;
}

/* Review quote */
.review {
  font-family: 'diamondsregular', Arial, sans-serif;
  font-size: 0.95em;
  line-height: 1.6em;
  margin: 2em 0 0 0;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.85);
  opacity: 0.9;
}

.review-source {
  display: block;
  margin-top: 6px;
  color: #e3cdb6;
  font-size: 0.85em;
}

/* Primary CTA button */
.cta-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin: 0 auto;
  max-width: 340px;
}

.cta-btn {
  display: block;
  width: 100%;
  padding: 1.15em 1.4em;
  text-decoration: none;
  color: #fff;
  border-radius: 7px;
  font-family: 'diamondsregular', Arial, sans-serif;
  font-size: 1.35em;
  font-weight: bold;
  letter-spacing: 0.04em;
  transition: all 0.25s ease;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
}

.cta-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

.cta-stream {
  background: rgba(30, 215, 96, 0.55);
  border: 2px solid rgba(30, 215, 96, 0.95);
}

.cta-stream:hover {
  background: rgba(30, 215, 96, 0.45);
  border-color: rgba(30, 215, 96, 0.9);
}

@media (max-width: 480px) {

    padding: 36px 24px 36px;
  }

  h1 {
    font-size: 1.8em;
  }

  img.logo {

<!-- Grain animation: pure canvas, no external assets, ~10fps for cinematic feel -->
<script>
(function () {
  var canvas = document.getElementById('dust');
  var ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawGrain() {
    var w = canvas.width;
    var h = canvas.height;
    var img = ctx.createImageData(w, h);
    var data = img.data;
    for (var i = 0; i < data.length; i += 4) {
      var v = (Math.random() * 255) | 0;
      data[i]     = v;   // R
      data[i + 1] = v;   // G
      data[i + 2] = v;   // B
      data[i + 3] = (Math.random() * 28) | 0; // A — keep it very subtle
    }
    ctx.putImageData(img, 0, 0);
    setTimeout(function () {
      requestAnimationFrame(drawGrain);
    }, 100); // ~10fps — enough movement without being distracting
  }

  drawGrain();
})();
</script>
